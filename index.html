<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Power-On Media Group</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;700;900&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --black: #060606;
      --accent: #e8ff47;
      --white: #f2f2f2;
      --mid: #888;
      --dim: #2a2a2a;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--black);
      color: var(--white);
      font-family: 'DM Mono', monospace;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      background-size: 200px;
      pointer-events: none;
      z-index: 999;
    }

    .atmosphere {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -58%);
      width: 800px;
      height: 800px;
      background: radial-gradient(circle at center,
        rgba(232, 255, 71, 0.06) 0%,
        rgba(232, 255, 71, 0.018) 35%,
        transparent 70%);
      pointer-events: none;
      z-index: 0;
      animation: atmosphereIn 2s ease 0.5s both;
    }

    @keyframes atmosphereIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
    }

    .logo-wrap {
      position: relative;
      width: 130px;
      height: 130px;
      display: grid;
      place-items: center;
      animation: logoIn 1.2s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes logoIn {
      0%   { opacity: 0; transform: scale(0.5) rotate(-30deg); }
      60%  { opacity: 1; }
      100% { opacity: 1; transform: scale(1) rotate(0deg); }
    }

    .pulse-rings {
      position: absolute;
      inset: -60px;
      pointer-events: none;
      overflow: visible;
    }

    .pulse-rings circle {
      fill: none;
      stroke: var(--accent);
      opacity: 0;
      transform-box: fill-box;
      transform-origin: 50% 50%;
      animation: pulseScale 3.5s ease-out infinite;
      will-change: transform, opacity;
    }

    .pulse-rings circle:nth-child(2) { animation-delay: 1.75s; }

    @keyframes pulseScale {
      0%   { transform: scale(1);    opacity: 0.45; stroke-width: 1.2; }
      100% { transform: scale(1.9);  opacity: 0;    stroke-width: 0.2; }
    }

    .logo-wrap .icon-svg {
      width: 100%;
      height: 100%;
      position: relative;
      z-index: 1;
    }

    .icon-shape {
      fill: var(--accent);
      filter:
        drop-shadow(0 0 6px rgba(232,255,71,0.9))
        drop-shadow(0 0 18px rgba(232,255,71,0.4))
        drop-shadow(0 0 40px rgba(232,255,71,0.15));
    }

    .wordmark {
      margin-top: 32px;
      text-align: center;
      animation: fadeUp 1s ease 0.5s both;
    }

    .wordmark-main {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: clamp(26px, 5.5vw, 40px);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--white);
      display: block;
      line-height: 1;
    }

    .wordmark-main .on { color: var(--accent); }

    .wordmark-sub {
      display: block;
      font-family: 'DM Mono', monospace;
      font-weight: 400;
      font-size: 9.5px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: #777;
      margin-top: 10px;
    }

    .tagline {
      margin-top: 44px;
      font-family: 'DM Mono', monospace;
      font-weight: 400;
      font-size: 11.5px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: #999;
      text-align: center;
      animation: fadeUp 1s ease 0.75s both;
    }

    .tagline::after {
      content: '_';
      animation: blink 1.1s step-end infinite;
      color: var(--accent);
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0; }
    }

    .contact-wrap {
      margin-top: 60px;
      animation: fadeUp 1s ease 1s both;
    }

    .contact-btn {
      background: none;
      border: 1px solid #3a3a3a;
      color: #999;
      font-family: 'DM Mono', monospace;
      font-weight: 400;
      font-size: 10px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      padding: 14px 36px;
      cursor: pointer;
      transition: border-color 0.3s, color 0.3s;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .contact-btn .dot {
      width: 5px;
      height: 5px;
      background: var(--accent);
      flex-shrink: 0;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .contact-btn:hover {
      border-color: rgba(232, 255, 71, 0.4);
      color: var(--white);
    }

    .contact-btn:hover .dot { opacity: 1; }

    .contact-panel {
      position: fixed;
      inset: 0;
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }

    .contact-panel.open {
      opacity: 1;
      pointer-events: all;
    }

    .panel-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(6, 6, 6, 0.9);
      backdrop-filter: blur(16px);
      cursor: pointer;
    }

    .panel-box {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 460px;
      border: 1px solid #1e1e1e;
      background: #090909;
      padding: 48px;
      transform: translateY(20px);
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .contact-panel.open .panel-box { transform: translateY(0); }

    .panel-close {
      position: absolute;
      top: 18px;
      right: 20px;
      background: none;
      border: none;
      color: #777;
      font-size: 15px;
      cursor: pointer;
      transition: color 0.2s;
      font-family: 'DM Mono', monospace;
    }

    .panel-close:hover { color: var(--white); }

    .panel-eyebrow {
      font-size: 9px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 6px;
    }

    .panel-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 32px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--white);
      margin-bottom: 36px;
      line-height: 1;
    }

    .form-group { margin-bottom: 18px; }

    .form-group label {
      display: block;
      font-size: 9px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 7px;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      background: #0f0f0f;
      border: 1px solid #1e1e1e;
      color: var(--white);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      font-weight: 300;
      padding: 11px 14px;
      outline: none;
      transition: border-color 0.25s;
      resize: none;
      -webkit-appearance: none;
    }

    .form-group input:focus,
    .form-group textarea:focus { border-color: rgba(232, 255, 71, 0.35); }

    .form-group textarea { height: 96px; }

    .form-submit {
      width: 100%;
      background: var(--accent);
      color: #060606;
      border: none;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      padding: 16px;
      cursor: pointer;
      margin-top: 6px;
      transition: opacity 0.2s;
    }

    .form-submit:hover { opacity: 0.85; }

    .form-note {
      margin-top: 12px;
      font-size: 9px;
      letter-spacing: 0.1em;
      color: #3a3a3a;
      text-align: center;
    }

    footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 22px 40px;
      display: flex;
      justify-content: space-between;
      z-index: 1;
      animation: fadeUp 1s ease 1.3s both;
    }

    footer span {
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #333;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .panel-box { padding: 32px 20px; }
      footer { padding: 16px 20px; }
    }
  </style>
</head>

<body>
  <div class="atmosphere"></div>

  <main class="page">
    <div class="logo-wrap">
      <svg class="pulse-rings" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <circle cx="50" cy="50" r="28"></circle>
        <circle cx="50" cy="50" r="28"></circle>
      </svg>

      <svg class="icon-svg" viewBox="0 0 952.5 952.5" xmlns="http://www.w3.org/2000/svg" aria-label="Power-On Media Group logo">
        <path class="icon-shape" d="M162.45,822.5c40.7,40.699,88.2,72.699,141,95.1c54.8,23.201,112.899,34.9,172.8,34.9
          s118-11.699,172.8-34.9c52.9-22.4,100.3-54.299,141-95.1c40.7-40.699,72.7-88.199,95.101-141
          c23.199-54.801,34.899-112.9,34.899-172.801c0-59.899-11.7-118-34.899-172.799
          c-22.4-52.9-54.301-100.3-95.101-141c-40.7-40.7-88.2-72.7-141-95.1c-7.5-3.2-15.1-6.1-22.8-8.9
          v153.5c23.4,13.3,45.2,29.9,64.8,49.5c57.4,57.4,89,133.7,89,214.799c0,81.102-31.6,157.4-89,214.801
          c-57.399,57.4-133.7,89-214.8,89s-157.4-31.6-214.8-89c-57.4-57.4-89-133.699-89-214.801
          c0-81.099,31.6-157.399,89-214.799c19.6-19.6,41.399-36.2,64.8-49.5V90.9
          c-7.6,2.8-15.2,5.7-22.8,8.9c-52.9,22.4-100.3,54.3-141,95.1c-40.7,40.7-72.7,88.2-95.1,141
          c-23.2,54.8-34.9,112.9-34.9,172.799c0,59.9,11.7,118,34.9,172.801
          C89.75,734.301,121.75,781.801,162.45,822.5z" />
        <path class="icon-shape" d="M476.25,511.801c38.7,0,70-31.301,70-70V213V70.4V70c0-38.7-31.3-70-70-70
          s-70,31.3-70,70v0.4V213v228.9C406.25,480.5,437.55,511.801,476.25,511.801z" />
      </svg>
    </div>

    <div class="wordmark">
      <span class="wordmark-main">Power-<span class="on">On</span> Media Group</span>
      <span class="wordmark-sub">poweronmediagroup.com</span>
    </div>

    <p class="tagline">We build things that work</p>

    <div class="contact-wrap">
      <button class="contact-btn" onclick="openPanel()">
        <span class="dot"></span>
        Get In Touch
      </button>
    </div>
  </main>

  <footer>
    <span>© 2025 Power-On Media Group</span>
    <span>Los Angeles, CA</span>
  </footer>

  <div class="contact-panel" id="contactPanel" role="dialog" aria-modal="true" aria-label="Contact form">
    <div class="panel-backdrop" onclick="closePanel()"></div>

    <div class="panel-box">
      <button class="panel-close" onclick="closePanel()" aria-label="Close">✕</button>
      <div class="panel-eyebrow">Power-On Media Group</div>
      <div class="panel-title">Lets Build</div>

      <form id="contactForm" onsubmit="handleSubmit(event)" novalidate>
        <div class="form-group">
          <label for="c-name">Name</label>
          <input type="text" id="c-name" name="name" placeholder="Your name" required autocomplete="name" />
        </div>

        <div class="form-group">
          <label for="c-email">Email</label>
          <input type="email" id="c-email" name="email" placeholder="your@email.com" required autocomplete="email" />
        </div>

        <div class="form-group">
          <label for="c-message">What are you building?</label>
          <textarea id="c-message" name="message" placeholder="Tell us about your project" required></textarea>
        </div>

        <button type="submit" class="form-submit">Send Message</button>
        <p class="form-note">We will respond within 24 hours.</p>
      </form>
    </div>
  </div>

  <script>
    function openPanel() {
      document.getElementById('contactPanel').classList.add('open');
      document.body.style.overflow = 'hidden';
      setTimeout(() => document.getElementById('c-name').focus(), 420);
    }

    function closePanel() {
      document.getElementById('contactPanel').classList.remove('open');
      document.body.style.overflow = '';
    }

    function handleSubmit(e) {
      e.preventDefault();

      const name = document.getElementById('c-name').value.trim();
      const replyTo = document.getElementById('c-email').value.trim();
      const msg = document.getElementById('c-message').value.trim();

      if (!name || !replyTo || !msg) return;

      const to = atob('cG93ZXJvbm1lZGlhZ3JvdXBAZ21haWwuY29t');
      const subject = encodeURIComponent('New Inquiry poweronmediagroup.com');
      const body = encodeURIComponent(`Name: ${name}\nReply To: ${replyTo}\n\n${msg}`);

      window.location.href = `mailto:${to}?subject=${subject}&body=${body}`;
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closePanel();
    });
  </script>
</body>
</html>
