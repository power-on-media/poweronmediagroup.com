<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Power-On Media Group</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;700;900&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --black: #060606;
      --accent: #e8ff47;
      --white: #f2f2f2;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--black);
      color: var(--white);
      font-family: 'DM Mono', monospace;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      background-size: 200px;
      pointer-events: none;
      z-index: 999;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      text-align: center;
    }

    .logo-wrap {
      position: relative;
      width: 130px;
      height: 130px;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: logoIn 1.2s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes logoIn {
      0%   { opacity: 0; transform: scale(0.5) rotate(-30deg); }
      100% { opacity: 1; transform: scale(1) rotate(0deg); }
    }

    /* CENTERED PULSE SYSTEM */
    .pulse-rings {
      position: absolute;
      left: 50%;
      top: 50%;
      width: calc(100% + 120px);
      height: calc(100% + 120px);
      transform: translate(-50%, -50%);
      pointer-events: none;
      overflow: visible;
    }

    .pulse-rings circle {
      fill: none;
      stroke: var(--accent);
      opacity: 0;
      transform-box: fill-box;
      transform-origin: 50% 50%;
      animation: pulseScale 3.5s ease-out infinite;
      will-change: transform, opacity;
    }

    .pulse-rings circle:nth-child(2) {
      animation-delay: 1.75s;
    }

    @keyframes pulseScale {
      0%   { transform: scale(1);    opacity: 0.45; stroke-width: 1.2; }
      100% { transform: scale(1.9);  opacity: 0;    stroke-width: 0.2; }
    }

    .icon-svg {
      width: 100%;
      height: 100%;
      position: relative;
      z-index: 1;
    }

    .icon-shape {
      fill: var(--accent);
      filter:
        drop-shadow(0 0 6px rgba(232,255,71,0.9))
        drop-shadow(0 0 18px rgba(232,255,71,0.4))
        drop-shadow(0 0 40px rgba(232,255,71,0.15));
    }

    .wordmark {
      margin-top: 32px;
    }

    .wordmark-main {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: clamp(26px, 5.5vw, 40px);
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .wordmark-main .on { color: var(--accent); }

    .wordmark-sub {
      font-size: 9.5px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: #777;
      margin-top: 10px;
    }

    .tagline {
      margin-top: 44px;
      font-size: 11.5px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: #999;
    }

    .tagline::after {
      content: '_';
      animation: blink 1.1s step-end infinite;
      color: var(--accent);
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    .contact-btn {
      margin-top: 60px;
      background: none;
      border: 1px solid #3a3a3a;
      color: #999;
      font-size: 10px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      padding: 14px 36px;
      cursor: pointer;
      transition: border-color 0.3s, color 0.3s;
text-decoration: none;
    }

    .contact-btn:hover {
      border-color: rgba(232, 255, 71, 0.4);
      color: var(--white);
    }

    footer {
      position: fixed;
      bottom: 0;
      width: 100%;
      padding: 22px 40px;
      display: flex;
      justify-content: space-between;
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #333;
    }

    @media (max-width: 480px) {
      footer { padding: 16px 20px; }
    }
  </style>
</head>
